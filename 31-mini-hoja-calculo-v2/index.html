<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>#31 Mini Hoja de Cálculo V2</title>
        <link rel="stylesheet" href="../css/style.css">
    </head>

    <body>
        <div id="content" class="exercise-page">
            <a href="../" class="back-link">← Volver</a>
            <h1>RESULTADO</h1>

            <div  id="contenedor-hoja" class="spreadsheet">

                <div class="sp-cell col-header" data-col="0"></div>
                <div class="sp-cell col-header" data-col="A">A</div>
                <div class="sp-cell col-header" data-col="B">B</div>
                <div class="sp-cell col-header" data-col="C">C</div>
                <div class="sp-cell col-header" data-col="D">D</div>

                <div class="sp-cell row-header">1</div>
                <div class="sp-cell head">ARTICULO</div>
                <div class="sp-cell head">CANTIDAD</div>
                <div class="sp-cell head">PRECIO PRODUCTO</div>
                <div class="sp-cell head">VALOR TOTAL</div>

                <div class="sp-cell row-header">2</div>
                <input type="text" name="a2" id="a2" class="sp-cell">
                <input type="text" name="b2" id="b2" class="sp-cell">
                <input type="text" name="c2" id="c2" class="sp-cell" >
                <input type="text" name="d2" id="d2" class="sp-cell" value="0" disabled>


                <div class="sp-cell row-header">3</div>
                <input type="text" name="a3" id="a3" class="sp-cell">
                <input type="text" name="b3" id="b3" class="sp-cell">
                <input type="text" name="c3" id="c3" class="sp-cell">
                <input type="text" name="d3" id="d3" class="sp-cell" value="0"  disabled>

                <div class="sp-cell row-header">4</div>
                <input type="text" name="a4" id="a4" class="sp-cell">
                <input type="text" name="b4" id="b4" class="sp-cell">
                <input type="text" name="c4" id="c4" class="sp-cell">
                <input type="text" name="d4" id="d4" class="sp-cell" value="0" disabled>

                <div class="sp-cell row-header">5</div>
                <input type="text" name="a5" id="a5" class="sp-cell">
                <input type="text" name="b5" id="b5" class="sp-cell">
                <input type="text" name="c5" id="c5" class="sp-cell">
                <input type="text" name="d5" id="d5" class="sp-cell" value="0" disabled>

            </div>

            <div  id="contenedor-resultado" class="total">
                <div class="sp-cell col-header" data-col="E">TOTAL</div>
                <input type="text" name="e1" id="e1" class="sp-cell celda-total" value="0" disabled>

            </div>

        </div>

        <script src="js/main.js"></script>

    </body>

</html>
