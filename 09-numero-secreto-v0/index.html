<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>#09 Número Secreto V0</title>
        <link rel="stylesheet" href="../css/style.css">
    </head>

    <body>
        <div id="content" class="exercise-page">
            <a href="../" class="back-link">← Volver</a>
            <h1>RESULTADO</h1>

            <p>Adivina el número secreto entre el 1 al 10</p>
            <p>Tienes <strong id="intentos">3/3</strong> intentos</p>

            <div id="play">
                <button id="start" class="btn"><i class="bi bi-play-fill"></i></button>
            </div>

            <div id="enter-box">
                <p>¿Cuál es el número secreto?</p>
                <div class="box-comprobar">
                    <input id="input" class="input" type="number" placeholder="0" min="1" max="10">
                    <button id="comprobar" class="btn-comprobar">Comprobar</button>
                </div>
            </div>


        </div>

        <script src="js/main.js"></script>
    </body>

</html>
